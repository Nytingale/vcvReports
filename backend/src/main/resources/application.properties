# ==============================================================
# =  Servlet
# ==============================================================
server.servlet.context-path = /vcv

# ==============================================================
# = Data Source
# ==============================================================
spring.datasource.companyName = vcv-datasource
spring.datasource.url = jdbc:mysql://localhost:3306/vcv?useSSL=false
spring.datasource.driverClassName = org.mariadb.jdbc.Driver
spring.datasource.username = root
spring.datasource.password = password
spring.datasource.test-while-idel = true
spring.datasource.validation-query = SELECT 1

# ==============================================================
# = Default Media Type for HTTP Responses
# ==============================================================
spring.data.rest.default-media-type = application/json

# ==============================================================
# = Show or not log for each sql query
# ==============================================================
spring.jpa.show-sql = true

# ==============================================================
# = Hibernate ddl auto (create, create-drop, update)
# ==============================================================
spring.jpa.hibernate.ddl-auto = update

# ==============================================================
# = The SQL dialect makes Hibernate generate better SQL for the chosen database
# ==============================================================
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MariaDB103Dialect

# ==============================================================
# = Spring Security / Queries for AuthenticationManagerBuilder
# ==============================================================
spring.queries.users-query = SELECT email, password, valid FROM Users WHERE email = ?
spring.queries.roles-query = SELECT company_type FROM Users WHERE email = ?

# ==============================================================
# = File Upload Settings
# ==============================================================
spring.servlet.multipart.enabled = true
spring.servlet.multipart.max-file-size = 200MB
spring.servlet.multipart.max-request-size = 215MB
spring.servlet.multipart.file-size-threshold = 5MB

# ==============================================================
# = File Upload Directories
# ==============================================================
file.image-dir = /images

# ==============================================================
# = VIN Decoder
# ==============================================================
vin-decoder.url = https://api.vindecoder.eu/2.0
vin-decoder.api-key = ${VIN_DECODER_API_KEY}
vin-decoder.secret-key = ${VIN_DECODER_SECRET_KEY}
