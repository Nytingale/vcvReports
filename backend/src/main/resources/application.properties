# ==============================================================
# = Data Source
# ==============================================================
spring.datasource.name = vcv-datasource
spring.datasource.url = jdbc:mysql://localhost:3306/vcv?useSSL=true
spring.datasource.username = root
spring.datasource.password = admin

# ==============================================================
# = Keep the connection alive if idle for a long time (needed in production)
# ==============================================================
spring.datasource.testWhileIdle = true
spring.datasource.validationQuery = SELECT 1

# ==============================================================
# = Show or not log for each sql query
# ==============================================================
spring.jpa.show-sql = true

# ==============================================================
# = Hibernate ddl auto (create, create-drop, update)
# ==============================================================
spring.jpa.hibernate.ddl-auto = update

# ==============================================================
# = The SQL dialect makes Hibernate generate better SQL for the chosen database
# ==============================================================
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MariaDB103Dialect

# ==============================================================
# = Spring Security / Queries for AuthenticationManagerBuilder
# ==============================================================
spring.queries.users-query = SELECT email, password, valid FROM Users WHERE email = ?
spring.queries.roles-query = SELECT company_type FROM Users WHERE email = ?

# ==============================================================
# =  Servlet
# ==============================================================
server.servlet.context-path = /vcv